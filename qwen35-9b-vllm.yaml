apiVersion: v1
kind: Service
metadata:
  namespace: dev-llm
  name: qwen35-9b-vllm-service
  labels:
    app: qwen35-9b-vllm
spec:
  type: NodePort
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30089
      protocol: TCP
      name: vllm
  selector:
    app: qwen35-9b-vllm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: dev-llm
  name: qwen35-9b-vllm
  labels:
    app: qwen35-9b-vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwen35-9b-vllm
  template:
    metadata:
      labels:
        app: qwen35-9b-vllm
    spec:
      runtimeClassName: nvidia
      containers:
        - name: vllm
          image: vllm/vllm-openai:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: http_proxy
              value: "http://10.12.1.8:7890"
            - name: https_proxy
              value: "http://10.12.1.8:7890"
            - name: HTTP_PROXY
              value: "http://10.12.1.8:7890"
            - name: HTTPS_PROXY
              value: "http://10.12.1.8:7890"
            - name: MODEL_PATH
              value: "/data/models/llm/Qwen3.5-9B"
            - name: MODEL_NAME
              value: "Qwen/Qwen3.5-9B"
          resources:
            requests:
              nvidia.com/gpu: 1
              memory: "32Gi"
              cpu: "8"
            limits:
              nvidia.com/gpu: 1
              memory: "64Gi"
              cpu: "16"
          volumeMounts:
            - name: model-storage
              mountPath: /data/models/llm
          args:
            - --model
            - /data/models/llm/Qwen3.5-9B
            - --dtype
            - half
            - --max-model-len
            - "8192"
            - --tensor-parallel-size
            - "1"
            - --gpu-memory-utilization
            - "0.9"
            - --host
            - "0.0.0.0"
            - --port
            - "8000"
      volumes:
        - name: model-storage
          hostPath:
            path: /data/models/llm
      nodeSelector:
        gpu: "on"
      tolerations:
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
